services:
  - type: web
    name: atoma-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: REDIS_URL
        fromService:
          type: redis
          name: atoma-cache
          property: connectionString
      - key: DATABASE_URL
        sync: false

  - type: redis
    name: atoma-cache
    ipAllowList: []
    plan: free
